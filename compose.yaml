services:
  # ====================== CORE SERVICES ======================

  nextcloud-aio-apache:
    container_name: nextcloud-aio-apache
    depends_on:
      nextcloud-aio-collabora:
        condition: service_started
        required: false
      nextcloud-aio-talk:
        condition: service_started
        required: false
      nextcloud-aio-notify-push:
        condition: service_started
        required: false
      nextcloud-aio-nextcloud:
        condition: service_started
        required: false
    image: ghcr.io/nextcloud-releases/aio-apache:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "33"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "${APACHE_PORT}"
    environment:
      - NC_DOMAIN
      - NEXTCLOUD_HOST=nextcloud-aio-nextcloud
      - APACHE_HOST=nextcloud-aio-apache
      - COLLABORA_HOST=nextcloud-aio-collabora
      - TALK_HOST=nextcloud-aio-talk
      - APACHE_PORT
      - AIO_LOG_LEVEL
      - ONLYOFFICE_HOST=nextcloud-aio-onlyoffice
      - TZ=${TIMEZONE}
      - APACHE_MAX_SIZE
      - APACHE_MAX_TIME=${NEXTCLOUD_MAX_TIME}
      - NOTIFY_PUSH_HOST=nextcloud-aio-notify-push
      - WHITEBOARD_HOST=nextcloud-aio-whiteboard
    volumes:
      - nextcloud_aio_nextcloud:/var/www/html:ro
      - nextcloud_aio_apache:/mnt/data:rw
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/log/supervisord
      - /var/run/supervisord
      - /usr/local/apache2/logs
      - /tmp
      - /home/www-data
    cap_drop:
      - NET_RAW
    networks:
      vlan:
        ipv4_address: 192.168.${VLAN_TAG}.10
        # ← REVERSE PROXY TARGET: http://192.168.${VLAN_TAG}.10:${APACHE_PORT}
      nextcloud-internal:
    dns:
      - ${DNS_SERVER}

  nextcloud-aio-database:
    container_name: nextcloud-aio-database
    image: ghcr.io/nextcloud-releases/aio-postgresql:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "999"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "5432"
    volumes:
      - nextcloud_aio_database:/var/lib/postgresql/data:rw
      - nextcloud_aio_database_dump:/mnt/data:rw
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=nextcloud_database
      - POSTGRES_USER=nextcloud
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - PGTZ=${TIMEZONE}
    stop_grace_period: 1800s
    restart: unless-stopped
    shm_size: 268435456
    read_only: true
    tmpfs:
      - /var/run/postgresql
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  nextcloud-aio-nextcloud:
    container_name: nextcloud-aio-nextcloud
    depends_on:
      nextcloud-aio-database:
        condition: service_started
        required: false
      nextcloud-aio-redis:
        condition: service_started
        required: false
      nextcloud-aio-clamav:
        condition: service_started
        required: false
      nextcloud-aio-fulltextsearch:
        condition: service_started
        required: false
      nextcloud-aio-imaginary:
        condition: service_started
        required: false
    image: ghcr.io/nextcloud-releases/aio-nextcloud:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "9000"
      - "9001"
    volumes:
      - nextcloud_aio_nextcloud:/var/www/html:rw
      - ${NEXTCLOUD_DATADIR}:/mnt/ncdata:rw
    environment:
      - NEXTCLOUD_HOST=nextcloud-aio-nextcloud
      - POSTGRES_HOST=nextcloud-aio-database
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=nextcloud_database
      - POSTGRES_USER=nextcloud
      - REDIS_HOST=nextcloud-aio-redis
      - REDIS_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - APACHE_HOST=nextcloud-aio-apache
      - APACHE_PORT
      - NC_DOMAIN
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=${NEXTCLOUD_PASSWORD}
      - NEXTCLOUD_DATA_DIR=/mnt/ncdata
      - OVERWRITEHOST=${NC_DOMAIN}
      - OVERWRITEPROTOCOL=https
      - TURN_SECRET
      - SIGNALING_SECRET
      - ONLYOFFICE_SECRET
      - AIO_LOG_LEVEL
      - NEXTCLOUD_MOUNT
      - CLAMAV_ENABLED
      - CLAMAV_HOST=nextcloud-aio-clamav
      - ONLYOFFICE_ENABLED=false        # Disabled
      - COLLABORA_ENABLED=true          # Enabled
      - COLLABORA_HOST=nextcloud-aio-collabora
      - TALK_ENABLED
      - ONLYOFFICE_HOST=nextcloud-aio-onlyoffice
      - UPDATE_NEXTCLOUD_APPS
      - TZ=${TIMEZONE}
      - TALK_PORT
      - IMAGINARY_ENABLED
      - IMAGINARY_HOST=nextcloud-aio-imaginary
      - PHP_UPLOAD_LIMIT=${NEXTCLOUD_UPLOAD_LIMIT}
      - PHP_MEMORY_LIMIT=${NEXTCLOUD_MEMORY_LIMIT}
      - FULLTEXTSEARCH_ENABLED
      - FULLTEXTSEARCH_HOST=nextcloud-aio-fulltextsearch
      - FULLTEXTSEARCH_PROTOCOL=http
      - FULLTEXTSEARCH_PORT=9200
      - FULLTEXTSEARCH_USER=elastic
      - FULLTEXTSEARCH_INDEX=nextcloud-aio
      - PHP_MAX_TIME=${NEXTCLOUD_MAX_TIME}
      - TRUSTED_CACERTS_DIR=${NEXTCLOUD_TRUSTED_CACERTS_DIR}
      - STARTUP_APPS=${NEXTCLOUD_STARTUP_APPS}
      - ADDITIONAL_APKS=${NEXTCLOUD_ADDITIONAL_APKS}
      - ADDITIONAL_PHP_EXTENSIONS=${NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS}
      - INSTALL_LATEST_MAJOR
      - TALK_RECORDING_ENABLED
      - RECORDING_SECRET
      - TALK_RECORDING_HOST=nextcloud-aio-talk-recording
      - FULLTEXTSEARCH_PASSWORD
      - REMOVE_DISABLED_APPS
      - IMAGINARY_SECRET
      - WHITEBOARD_SECRET
      - WHITEBOARD_ENABLED
    stop_grace_period: 600s
    restart: unless-stopped
    shm_size: 134217728
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  nextcloud-aio-notify-push:
    container_name: nextcloud-aio-notify-push
    image: ghcr.io/nextcloud-releases/aio-notify-push:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "33"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "7867"
    volumes:
      - nextcloud_aio_nextcloud:/var/www/html:ro
    environment:
      - NEXTCLOUD_HOST=nextcloud-aio-nextcloud
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  nextcloud-aio-redis:
    container_name: nextcloud-aio-redis
    image: ghcr.io/nextcloud-releases/aio-redis:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "999"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "6379"
    environment:
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
    volumes:
      - nextcloud_aio_redis:/data:rw
    restart: unless-stopped
    read_only: true
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  # ====================== OPTIONAL SERVICES ======================

  nextcloud-aio-collabora:
    container_name: nextcloud-aio-collabora
    command: ${ADDITIONAL_COLLABORA_OPTIONS}
    image: ghcr.io/nextcloud-releases/aio-collabora:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    init: true
    healthcheck:
      start_period: 60s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 9
    expose:
      - "9980"
    environment:
      - aliasgroup1=https://${NC_DOMAIN}:443,http://nextcloud-aio-apache:23973
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:logging.disable_server_audit=true --o:welcome.enable=false --o:fetch_update_check=0 --o:allow_update_popup=false --o:remote_font_config.url=https://${NC_DOMAIN}/apps/richdocuments/settings/fonts.json --o:net.post_allow.host[0]=.+
      - dictionaries=${COLLABORA_DICTIONARIES}
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - server_name=${NC_DOMAIN}
      - DONT_GEN_SSL_CERT=1
    restart: unless-stopped
    shm_size: 268435456
    tmpfs:
      - /tmp
    cap_add:
      - SYS_ADMIN
      - SYS_CHROOT
      - FOWNER
      - CHOWN
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  nextcloud-aio-talk:
    container_name: nextcloud-aio-talk
    image: ghcr.io/nextcloud-releases/aio-talk:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "1000"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    # ipvlan-only: eturnal uses hostname -i for the TURN relay address.
    # Dual networks break this (non-deterministic IP selection).
    # Talk doesn't need bridge — signaling connects outbound via https://${NC_DOMAIN},
    # and Apache reaches talk:8081 via the shared vlan network.
    expose:
      - "${TALK_PORT}"
      - "8081"
    environment:
      - NC_DOMAIN
      - TALK_HOST=nextcloud-aio-talk
      - TURN_SECRET
      - SIGNALING_SECRET
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - TALK_PORT
      - INTERNAL_SECRET=${TALK_INTERNAL_SECRET}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/log/supervisord
      - /var/run/supervisord
      - /opt/eturnal/run
      - /conf
      - /tmp
    cap_drop:
      - NET_RAW
    networks:
      vlan:
        ipv4_address: 192.168.${VLAN_TAG}.11
        #   FIREWALL RULES:
        #   Port forward TALK_PORT (3478) TCP+UDP to 192.168.${VLAN_TAG}.11
    dns:
      - ${DNS_SERVER}

  nextcloud-aio-clamav:
    container_name: nextcloud-aio-clamav
    image: ghcr.io/nextcloud-releases/aio-clamav:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "100"
    init: false
    healthcheck:
      start_period: 60s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 9
    expose:
      - "3310"
    environment:
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - MAX_SIZE=${NEXTCLOUD_UPLOAD_LIMIT}
    volumes:
      - nextcloud_aio_clamav:/var/lib/clamav:rw
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/clamav
      - /run/clamav
      - /var/log/supervisord
      - /var/run/supervisord
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  nextcloud-aio-imaginary:
    container_name: nextcloud-aio-imaginary
    image: ghcr.io/nextcloud-releases/aio-imaginary:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    user: "65534"
    init: true
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3
    expose:
      - "9000"
    environment:
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - IMAGINARY_SECRET
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    cap_drop:
      - NET_RAW
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - nextcloud-internal

  nextcloud-aio-fulltextsearch:
    container_name: nextcloud-aio-fulltextsearch
    image: ghcr.io/nextcloud-releases/aio-fulltextsearch:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    init: false
    healthcheck:
      start_period: 60s
      test: /healthcheck.sh
      interval: 10s
      timeout: 5s
      start_interval: 5s
      retries: 5
    expose:
      - "9200"
    environment:
      - AIO_LOG_LEVEL
      - TZ=${TIMEZONE}
      - ES_JAVA_OPTS=${FULLTEXTSEARCH_JAVA_OPTIONS}
      - bootstrap.memory_lock=false
      - cluster.name=nextcloud-aio
      - discovery.type=single-node
      - http.port=9200
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=false
      - indices.fielddata.cache.size=20%
      - indices.memory.index_buffer_size=20%
      - thread_pool.write.queue_size=1000
      - FULLTEXTSEARCH_PASSWORD
    volumes:
      - nextcloud_aio_elasticsearch:/usr/share/elasticsearch/data:rw
    restart: unless-stopped
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

  # ====================== COMMUNITY CONTAINERS ======================

  # Memories transcoder (go-vod) — requires NVIDIA Container Toolkit on host.
  # Downloads its binary from Nextcloud at startup, so the memories container
  # will restart-loop until Nextcloud is up and the Memories app is installed.
  #
  # After first startup, run inside the nextcloud container:
  #   docker compose exec nextcloud-aio-nextcloud php occ config:system:set memories.vod.external --value true --type bool
  #   docker compose exec nextcloud-aio-nextcloud php occ config:system:set memories.vod.connect --value nextcloud-aio-memories-transcoder:47788
  #
  # If you also have Intel/AMD integrated graphics, add:
  #   devices:
  #     - /dev/dri:/dev/dri
  nextcloud-aio-memories-transcoder:
    container_name: nextcloud-aio-memories-transcoder
    image: radialapps/go-vod:latest
    labels:
      - com.getarcaneapp.arcane.updater=false
    init: true
    depends_on:
      nextcloud-aio-nextcloud:
        condition: service_started
        required: false
    expose:
      - "47788"
    environment:
      - TZ=${TIMEZONE}
      - NEXTCLOUD_HOST=https://${NC_DOMAIN}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${NEXTCLOUD_DATADIR}:/mnt/ncdata:ro
    restart: unless-stopped
    cap_drop:
      - NET_RAW
    networks:
      - nextcloud-internal

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  nextcloud_aio_apache:
    name: nextcloud_aio_apache
  nextcloud_aio_clamav:
    name: nextcloud_aio_clamav
  nextcloud_aio_database:
    name: nextcloud_aio_database
  nextcloud_aio_database_dump:
    name: nextcloud_aio_database_dump
  nextcloud_aio_elasticsearch:
    name: nextcloud_aio_elasticsearch
  nextcloud_aio_nextcloud:
    name: nextcloud_aio_nextcloud
  nextcloud_aio_redis:
    name: nextcloud_aio_redis

networks:
  vlan:
    name: vlan${VLAN_TAG}_nextcloud
    driver: ipvlan
    driver_opts:
      parent: ${VLAN_TRUNK_INTERFACE}.${VLAN_TAG}
    ipam:
      config:
        - subnet: 192.168.${VLAN_TAG}.0/24
          gateway: 192.168.${VLAN_TAG}.1
  nextcloud-internal:
    name: nextcloud-internal
    driver: bridge
